<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Approval Workflow</title>

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #f1f5f9;
  padding: 30px;
}

/* HEADER */
.header {
  font-size: 26px;
  font-weight: 600;
  margin-bottom: 25px;
}

/* LAYOUT */
.container {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
}

/* CARD */
.card {
  background: white;
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

/* TITLE */
.card h3 {
  margin-bottom: 15px;
}

/* INFO ROW */
.info {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.label {
  color: #666;
  font-size: 14px;
}

/* STATUS */
.status {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}

.pending { background: #fef3c7; color: #92400e; }
.approved { background: #dcfce7; color: #166534; }
.rejected { background: #fee2e2; color: #991b1b; }

/* TEXTAREA */
textarea {
  width: 100%;
  height: 90px;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  margin-top: 10px;
}

/* BUTTONS */
.actions {
  margin-top: 15px;
}

.btn {
  padding: 10px 18px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  margin-right: 10px;
}

.approve {
  background: #22c55e;
  color: white;
}

.reject {
  background: #ef4444;
  color: white;
}

/* TIMELINE */
.timeline {
  border-left: 3px solid #2563eb;
  padding-left: 15px;
}

.timeline-item {
  margin-bottom: 20px;
  position: relative;
}

.timeline-item::before {
  content: '';
  width: 10px;
  height: 10px;
  background: #2563eb;
  border-radius: 50%;
  position: absolute;
  left: -20px;
  top: 5px;
}

.timeline-title {
  font-weight: 600;
}

.timeline-time {
  font-size: 12px;
  color: #777;
}

/* WORKFLOW STEPS */
.steps {
  display: flex;
  justify-content: space-between;
  margin-top: 20px;
}

.step {
  text-align: center;
  flex: 1;
}

.circle {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: #e5e7eb;
  margin: auto;
  margin-bottom: 5px;
  line-height: 30px;
}

.active {
  background: #2563eb;
  color: white;
}

.completed {
  background: #22c55e;
  color: white;
}

.step span {
  font-size: 12px;
}

</style>
</head>

<body>

<div class="header">Approval Workflow</div>

<div class="container">

  <!-- LEFT SIDE -->
  <div class="card">
    <h3>Quotation Approval</h3>

    <div class="info">
      <span class="label">RFQ ID:</span>
      <span>#RFQ102</span>
    </div>

    <div class="info">
      <span class="label">Vendor:</span>
      <span>ABC Traders</span>
    </div>

    <div class="info">
      <span class="label">Price:</span>
      <span>₹15,000</span>
    </div>

    <div class="info">
      <span class="label">Status:</span>
      <span class="status pending">Pending</span>
    </div>

    <label class="label">Approval Remarks</label>
    <textarea placeholder="Enter remarks..."></textarea>

    <div class="actions">
      <button class="btn approve">Approve</button>
      <button class="btn reject">Reject</button>
    </div>

    <!-- WORKFLOW STEPS -->
    <div class="steps">
      <div class="step">
        <div class="circle completed">✓</div>
        <span>Submitted</span>
      </div>

      <div class="step">
        <div class="circle active">2</div>
        <span>Manager</span>
      </div>

      <div class="step">
        <div class="circle">3</div>
        <span>Admin</span>
      </div>

      <div class="step">
        <div class="circle">4</div>
        <span>Finance</span>
      </div>
    </div>

  </div>

  <!-- RIGHT SIDE -->
  <div class="card">
    <h3>Approval Timeline</h3>

    <div class="timeline">

      <div class="timeline-item">
        <div class="timeline-title">Quotation Submitted</div>
        <div class="timeline-time">Today, 10:00 AM</div>
      </div>

      <div class="timeline-item">
        <div class="timeline-title">Manager Review Pending</div>
        <div class="timeline-time">Waiting for approval</div>
      </div>

    </div>

  </div>

</div>

</body>
</html>
